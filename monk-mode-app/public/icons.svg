<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Fasting Mode logo">
  <defs>
    <radialGradient id="tileGlow" cx="50%" cy="34%" r="72%">
      <stop offset="0" stop-color="#101a2f"/>
      <stop offset="0.42" stop-color="#050912"/>
      <stop offset="1" stop-color="#000104"/>
    </radialGradient>
    <radialGradient id="orbFill" cx="43%" cy="24%" r="80%">
      <stop offset="0" stop-color="#26385c"/>
      <stop offset="0.32" stop-color="#0c1426"/>
      <stop offset="0.72" stop-color="#02050c"/>
      <stop offset="1" stop-color="#000104"/>
    </radialGradient>
    <linearGradient id="orbRing" x1="104" y1="100" x2="408" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9db7ff" stop-opacity="0.62"/>
      <stop offset="0.38" stop-color="#334579" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="crossFill" x1="220" y1="164" x2="292" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.54" stop-color="#f0f5ff"/>
      <stop offset="1" stop-color="#b9c7e9"/>
    </linearGradient>
    <linearGradient id="crescent" x1="176" y1="319" x2="336" y2="319" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b2a72" stop-opacity="0"/>
      <stop offset="0.23" stop-color="#245fd6"/>
      <stop offset="0.5" stop-color="#6aa5ff"/>
      <stop offset="0.78" stop-color="#245fd6"/>
      <stop offset="1" stop-color="#0b2a72" stop-opacity="0"/>
    </linearGradient>
    <filter id="orbShadow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.78"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#143985" flood-opacity="0.24"/>
    </filter>
    <filter id="crossGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.46"/>
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0c1d42" flood-opacity="0.82"/>
    </filter>
    <filter id="blueGlow" x="-60%" y="-120%" width="220%" height="320%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#3b82ff" flood-opacity="0.72"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="#000104"/>
  <rect x="30" y="30" width="452" height="452" rx="92" fill="url(#tileGlow)" opacity="0.98"/>
  <circle cx="256" cy="256" r="156" fill="#02050d" filter="url(#orbShadow)"/>
  <circle cx="256" cy="256" r="144" fill="url(#orbFill)" stroke="url(#orbRing)" stroke-width="5"/>
  <circle cx="256" cy="256" r="112" fill="none" stroke="#f7faff" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M177 298c18 35 47 52 79 52s61-17 79-52c-16 55-47 85-79 85s-63-30-79-85Z" fill="url(#crescent)" filter="url(#blueGlow)"/>
  <g filter="url(#crossGlow)">
    <rect x="239" y="166" width="34" height="172" rx="15" fill="url(#crossFill)"/>
    <rect x="186" y="226" width="140" height="34" rx="15" fill="url(#crossFill)"/>
    <rect x="239" y="166" width="34" height="172" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2"/>
    <rect x="186" y="226" width="140" height="34" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2"/>
  </g>
